<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>北斗七星</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#fff7d1;
}

input,button,select{
  font-size:18px;
  padding:8px;
  margin:5px 0;
}

#noteText{
  width:100%;
  height:300px;
  padding:20px 30px;
  background:#fffdf5;
  border:1px solid #d8c9a7;
  border-radius:8px;
  font-size:18px;
  line-height:1.8;
  font-family:"Yuji Syuku",serif;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  background-image:
    linear-gradient(to bottom,transparent,transparent),
    repeating-linear-gradient(
      to bottom,
      #fffdf5 0px,
      #fffdf5 28px,
      #e8dcc2 29px
    );
  border-left:4px solid #ffe9a3;
}

.noteItem{
  padding:12px 15px;
  margin:10px 0;
  background:#fffdf5;
  border:1px solid #d8c9a7;
  border-radius:8px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.noteButtons button{
  margin-left:8px;
}
</style>
</head>
<body>

<h1>北斗七星</h1>

<h2>ファイル生成</h2>
<div>ファイル名</div>
<input id="fileTitle">
<div>パスワード</div>
<input id="filePassword" type="password">
<br><br>
<button id="createBtn" onclick="createFile()" disabled>生成</button>

<hr>

<h2>ファイル選択</h2>
<select id="fileSelect"></select>
<button onclick="openSelectedFile()">開く</button>
<button onclick="changePassword()">パスワード変更</button>
<button onclick="deleteFile()">削除</button>

<hr>

<h2>ノート一覧</h2>
<div id="notesList"></div>
<button id="addNoteBtn" onclick="addNote()" disabled>＋ノートを追加</button>

<hr>

<h2>ノート内容</h2>
<textarea id="noteText" disabled></textarea><br>

<br>
<button onclick="saveNote()">保存</button>
<button onclick="closeNote()">閉じる</button>

<hr>

<h2>他の人のノートをみる</h2>
<div>パスワードをいれてください</div>
<input id="otherPassword" type="password">
<button onclick="openByPassword()">開く</button>

<hr>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  updateDoc,
  deleteDoc,
  getDocs,
  query,
  where,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously,
  browserLocalPersistence,
  setPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPl_QKfAZM8TmWEtbi4rXb4ZasdM9WOQg",
  authDomain: "hokutoshitisei.firebaseapp.com",
  projectId: "hokutoshitisei",
  storageBucket: "hokutoshitisei.appspot.com",
  messagingSenderId: "16257405689",
  appId: "1:16257405689:web:17e7b92362c56d82b48828",
  measurementId: "G-LFGEC7VKN3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentFileId=null;
let currentNoteId=null;
let readOnly=false;

function hash(str){
  return btoa(unescape(encodeURIComponent(str)));
}

/* ▼ ノート内容を常に閉じた状態に戻す */
function resetNoteArea(){
  noteText.value="";
  noteText.disabled=true;
}

/* ▼ ログイン後 */
setPersistence(auth, browserLocalPersistence)
  .then(() => signInAnonymously(auth))
  .then(() => {
    document.getElementById("createBtn").disabled = false;
    loadMyFiles();
  });

/* ▼ ファイル作成 */
window.createFile=async function(){
  const title=fileTitle.value.trim();
  const pass=filePassword.value.trim();
  if(!title||!pass){
    alert("入力してね");
    return;
  }

  await addDoc(collection(db,"files"),{
    title,
    password:hash(pass),
    ownerUid:auth.currentUser.uid,
    createdAt:serverTimestamp()
  });

  alert("作成しました");
  loadMyFiles();
};

/* ▼ 自分のファイル一覧 */
async function loadMyFiles(){
  fileSelect.innerHTML="";

  const q=query(
    collection(db,"files"),
    where("ownerUid","==",auth.currentUser.uid),
    orderBy("createdAt")
  );

  const snap=await getDocs(q);

  snap.forEach(d=>{
    const op=document.createElement("option");
    op.value=d.id;
    op.textContent=d.data().title;
    fileSelect.appendChild(op);
  });

  resetNoteArea();
}

/* ▼ ファイルを開く */
window.openSelectedFile=function(){
  const fileId=fileSelect.value;
  if(!fileId){
    alert("ファイルなし");
    return;
  }
  readOnly=false;
  currentFileId=fileId;
  addNoteBtn.disabled=false;

  resetNoteArea();
  loadNotes();
};

/* ▼ 他人のファイルを開く */
window.openByPassword=async function(){
  const pass=otherPassword.value.trim();
  if(!pass){
    alert("パスワードを入力してね");
    return;
  }

  const q=query(collection(db,"files"));
  const snap=await getDocs(q);

  let found=null;

  snap.forEach(d=>{
    if(d.data().password===hash(pass)){
      found=d;
    }
  });

  if(!found){
    alert("見つからないよ");
    return;
  }

  currentFileId=found.id;
  readOnly=true;
  addNoteBtn.disabled=true;

  resetNoteArea();
  loadNotes();
};

/* ▼ ノート一覧 */
async function loadNotes(){
  notesList.innerHTML="";
  resetNoteArea();

  const q=query(
    collection(db,"files",currentFileId,"notes"),
    orderBy("createdAt")
  );

  const snap=await getDocs(q);

  snap.forEach(d=>{
    const data=d.data();

    const div=document.createElement("div");
    div.className="noteItem";

    div.innerHTML=`
      <div>${data.title}</div>
      <div class="noteButtons">
        <button onclick="viewNote('${d.id}')">開く</button>
        ${!readOnly ? `<button onclick="editNote('${d.id}')">編集</button>` : ""}
        ${!readOnly ? `<button onclick="deleteNote('${d.id}')">削除</button>` : ""}
      </div>
    `;

    notesList.appendChild(div);
  });
}

/* ▼ ノート追加 */
window.addNote=async function(){
  if(readOnly)return;

  const title=prompt("ノート名");
  if(!title)return;

  const newNote = await addDoc(
    collection(db,"files",currentFileId,"notes"),
    {
      title,
      content:"",
      createdAt:serverTimestamp()
    }
  );

  currentNoteId = newNote.id;

  noteText.disabled = false;
  noteText.value = "";

  loadNotes();
};

/* ▼ ノート観覧 */
window.viewNote=async function(noteId){
  currentNoteId=noteId;
  const snap=await getDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  const data = snap.data();

  noteText.value=data.content;
  noteText.disabled=true;
};

/* ▼ ノート編集 */
window.editNote=async function(noteId){
  if(readOnly)return;

  currentNoteId=noteId;
  const snap=await getDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  noteText.value=snap.data().content;
  noteText.disabled=false;
};

/* ▼ ノート保存 */
window.saveNote=async function(){
  if(readOnly)return;

  await updateDoc(
    doc(db,"files",currentFileId,"notes",currentNoteId),
    { content:noteText.value }
  );
  alert("保存した");
};

/* ▼ ノート削除 */
window.deleteNote=async function(noteId){
  if(readOnly)return;

  if(!confirm("削除する？"))return;
  await deleteDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  loadNotes();
};

/* ▼ ノートだけ閉じる（ファイルは閉じない） */
window.closeNote = function () {
  currentNoteId = null;
  resetNoteArea();
};

/* ▼ パスワード変更 */
window.changePassword = async function () {
  if (!currentFileId) {
    alert("ファイルを開いてください");
    return;
  }

  if (readOnly) {
    alert("他人のファイルは変更できません");
    return;
  }

  const newPass = prompt("新しいパスワードを入力してください");
  if (!newPass) return;

  await updateDoc(doc(db, "files", currentFileId), {
    password: hash(newPass)
  });

  alert("パスワードを変更しました");
};

</script>

</body>
</html>
