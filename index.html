<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>北斗七星</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#fff7d1;
  transition: background 0.3s, color 0.3s;
}

/* ▼ 通常モード：ボタンは元の大きさ */
button {
  margin: 10px 0;
}

/* ▼ クラシックモード（旧オトナモード） */
body.classic-mode {
  color:#000;
}

/* ▼ クラシックモード：黒背景 */
body.classic-mode.black {
  background:#000;
  color:#fff;
}

body.classic-mode.black button {
  background:#333;
  color:#fff;
}

/* ▼ クラシックモード：和紙 × 薄い青（和紙感MAX） */
body.classic-mode.wafu {
  color: #000;
  background:
    /* 和紙の繊維（細かい粒子） */
    radial-gradient(rgba(255,255,255,0.6) 1px, transparent 1px),
    radial-gradient(rgba(255,255,255,0.4) 1px, transparent 1px),
    /* 和紙のムラ（淡い揺らぎ） */
    linear-gradient(135deg, rgba(230,240,250,0.9), rgba(240,245,255,0.95)),
    linear-gradient(0deg, rgba(255,255,255,0.9), rgba(240,240,240,0.95));
  
  background-size:
    3px 3px,
    5px 5px,
    100% 100%,
    100% 100%;

  background-blend-mode: soft-light;
}

body.classic-mode.wafu button {
  background:#e0e8f5;
  color:#000;
  border:1px solid #b0bfd5;
}

/* ▼ ノート全画面（クラシックモード時） */
body.classic-mode #noteText {
  width:100%;
  height:90vh;
  font-size:22px;
  line-height:1.9;
}

/* ▼ ノート内容は最初は非表示 */
#noteText{
  display:none;
  width:100%;
  height:300px;
  padding:20px 30px;
  background:#fffdf5;
  border:1px solid #d8c9a7;
  border-radius:8px;
  font-size:18px;
  line-height:1.8;
  font-family:"Yuji Syuku",serif;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  background-image:
    linear-gradient(to bottom,transparent,transparent),
    repeating-linear-gradient(
      to bottom,
      #fffdf5 0px,
      #fffdf5 28px,
      #e8dcc2 29px
    );
  border-left:4px solid #ffe9a3;
}

.noteItem{
  padding:12px 15px;
  margin:10px 0;
  background:#fffdf5;
  border:1px solid #d8c9a7;
  border-radius:8px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
  cursor:grab;
}
.noteButtons button{
  margin-left:8px;
}
</style>
</head>
<body>

<h1>北斗七星</h1>

<h2>モード切り替え</h2>
<button id="classicModeBtn" onclick="toggleClassicMode()">クラシックモード：OFF</button>

<div id="classicThemeButtons" style="display:none;">
  <button onclick="setClassicTheme('black')">黒背景</button>
  <button onclick="setClassicTheme('wafu')">和風モダン</button>
</div>

<h2>ファイル生成</h2>
<div>ファイル名</div>
<input id="fileTitle">
<div>パスワード</div>
<input id="filePassword" type="password">
<br><br>
<button id="createBtn" onclick="createFile()" disabled>生成</button>

<hr>
<h2>ファイル選択</h2>

<select id="fileSelect"
        onchange="selectFileChanged()"
        onclick="selectFileChanged()"
        ontouchstart="selectFileChanged()"></select>

<button onclick="openSelectedFile()">開く</button>
<button onclick="changePassword()">パスワード変更</button>
<button onclick="deleteFile()">削除</button>
<button onclick="closeFile()">ファイルを閉じる</button>

<hr>

<h2>クラシックモード専用ファイル</h2>
<button onclick="openClassicFile()">パスワード無しで開く</button>

<hr>

<h2>ノート一覧（ドラッグで並び替え）</h2>
<div id="notesList"></div>
<button id="addNoteBtn" onclick="addNote()" disabled>＋ノートを追加</button>

<hr>

<h2>ノート内容</h2>
<textarea id="noteText" disabled></textarea><br>

<br>
<button onclick="saveNote()">保存</button>
<button onclick="closeNote()">閉じる</button>

<hr>

<h2>他の人のノートをみる</h2>
<div>パスワードをいれてください</div>

<input id="otherPassword" type="password">
<button onclick="togglePassword()">👁️</button>
<button onclick="openByPassword()">開く</button>

<hr>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  updateDoc,
  deleteDoc,
  getDocs,
  query,
  where,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously,
  browserLocalPersistence,
  setPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPl_QKfAZM8TmWEtbi4rXb4ZasdM9WOQg",
  authDomain: "hokutoshitisei.firebaseapp.com",
  projectId: "hokutoshitisei",
  storageBucket: "hokutoshitisei.appspot.com",
  messagingSenderId: "16257405689",
  appId: "1:16257405689:web:17e7b92362c56d82b48828",
  measurementId: "G-LFGEC7VKN3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentFileId = null;
let currentNoteId = null;
let readOnly = false;
let autoSaveTimer = null;

/* ▼ パスワードハッシュ */
function hash(str){
  return btoa(unescape(encodeURIComponent(str)));
}

/* ▼ ノート非表示 */
function hideNote(){
  const noteText = document.getElementById("noteText");
  noteText.value = "";
  noteText.disabled = true;
  noteText.style.display = "none";
}

/* ▼ ノート表示 */
function showNote(){
  const noteText = document.getElementById("noteText");
  noteText.style.display = "block";
}

/* ▼ パスワード目玉 */
window.togglePassword = function () {
  const input = document.getElementById("otherPassword");
  input.type = (input.type === "password") ? "text" : "password";
};

/* ▼ スマホ対策：選択した瞬間に更新 */
window.selectFileChanged = function () {
  const fileSelect = document.getElementById("fileSelect");
  currentFileId = fileSelect.value;
};

/* ▼ ログイン後 */
setPersistence(auth, browserLocalPersistence)
  .then(() => signInAnonymously(auth))
  .then(() => {
    document.getElementById("createBtn").disabled = false;
    loadMyFiles();
  });

/* ▼ order が無いノートを自動修正 */
async function fixMissingOrder() {
  const notesRef = collection(db, "files", currentFileId, "notes");
  const snap = await getDocs(notesRef);

  let index = 0;
  const updates = [];

  snap.forEach(docSnap => {
    const data = docSnap.data();
    if (data.order === undefined) {
      updates.push(
        updateDoc(doc(db, "files", currentFileId, "notes", docSnap.id), {
          order: index
        })
      );
    }
    index++;
  });

  await Promise.all(updates);
}

/* ▼ ファイル作成 */
window.createFile = async function(){
  const title = document.getElementById("fileTitle").value.trim();
  const pass  = document.getElementById("filePassword").value.trim();
  if(!title || !pass){
    alert("入力してね");
    return;
  }

  await addDoc(collection(db,"files"),{
    title,
    password:hash(pass),
    ownerUid:auth.currentUser.uid,
    createdAt:serverTimestamp()
  });

  alert("作成しました");
  loadMyFiles();
};

/* ▼ 自分のファイル一覧 */
async function loadMyFiles(){
  const fileSelect = document.getElementById("fileSelect");
  fileSelect.innerHTML = "";

  const q = query(
    collection(db,"files"),
    where("ownerUid","==",auth.currentUser.uid),
    orderBy("createdAt")
  );

  const snap = await getDocs(q);

  snap.forEach(d=>{
    const op = document.createElement("option");
    op.value = d.id;
    op.textContent = d.data().title;
    fileSelect.appendChild(op);
  });

  hideNote();
}

/* ▼ ファイルを開く */
window.openSelectedFile = function(){
  const fileSelect = document.getElementById("fileSelect");

  currentFileId = fileSelect.value;

  if(!currentFileId){
    alert("ファイルなし");
    return;
  }

  readOnly = false;
  document.getElementById("addNoteBtn").disabled = false;

  hideNote();
  loadNotes();
};
/* ▼ 他人のファイルを開く */
window.openByPassword = async function () {
  const pass = document.getElementById("otherPassword").value.trim();
  if (!pass) {
    alert("パスワードを入力してね");
    return;
  }

  const q = query(collection(db, "files"));
  const snap = await getDocs(q);

  let found = null;

  snap.forEach(d => {
    if (d.data().password === hash(pass)) {
      found = d;
    }
  });

  if (!found) {
    alert("見つからないよ");
    return;
  }

  currentFileId = found.id;
  readOnly = true;
  document.getElementById("addNoteBtn").disabled = true;

  hideNote();
  loadNotes();
};

/* ▼ クラシックモード：パスワード無しファイルを開く */
window.openClassicFile = async function () {
  const q = query(collection(db, "files"));
  const snap = await getDocs(q);

  let found = null;

  snap.forEach(d => {
    if (!d.data().password) {
      found = d;
    }
  });

  if (!found) {
    alert("パスワード無しのファイルがありません");
    return;
  }

  currentFileId = found.id;
  readOnly = false;
  document.getElementById("addNoteBtn").disabled = false;

  hideNote();
  loadNotes();
};

/* ▼ ノート一覧（並び替え対応） */
async function loadNotes(){
  const notesList = document.getElementById("notesList");
  notesList.innerHTML = "";
  hideNote();

  /* ▼ まず order が無いノートを自動修正 */
  await fixMissingOrder();

  const q = query(
    collection(db,"files",currentFileId,"notes"),
    orderBy("order"),
    orderBy("createdAt")
  );

  const snap = await getDocs(q);

  snap.forEach(d=>{
    const data = d.data();

    const div = document.createElement("div");
    div.className = "noteItem";
    div.draggable = true;
    div.dataset.id = d.id;

    div.innerHTML = `
      <div>${data.title}</div>
      <div class="noteButtons">
        <button onclick="viewNote('${d.id}')">開く</button>
        ${!readOnly ? `<button onclick="editNote('${d.id}')">編集</button>` : ""}
        ${!readOnly ? `<button onclick="deleteNote('${d.id}')">削除</button>` : ""}
      </div>
    `;

    notesList.appendChild(div);
  });

  enableDragSort();
}

/* ▼ ドラッグ並び替え */
function enableDragSort(){
  const list = document.getElementById("notesList");
  let dragItem = null;

  list.querySelectorAll(".noteItem").forEach(item=>{
    item.addEventListener("dragstart",()=>{
      dragItem = item;
      item.style.opacity = "0.5";
    });

    item.addEventListener("dragend",()=>{
      item.style.opacity = "1";
      saveOrder();
    });

    item.addEventListener("dragover",(e)=>{
      e.preventDefault();
      const rect = item.getBoundingClientRect();
      const offset = e.clientY - rect.top;
      if(offset > rect.height/2){
        item.after(dragItem);
      }else{
        item.before(dragItem);
      }
    });
  });
}

/* ▼ 並び順保存 */
async function saveOrder(){
  const list = document.getElementById("notesList").children;
  let index = 0;

  for(const item of list){
    const id = item.dataset.id;
    await updateDoc(
      doc(db,"files",currentFileId,"notes",id),
      { order:index }
    );
    index++;
  }
}

/* ▼ ノート追加 */
window.addNote = async function(){
  if(readOnly)return;

  const title = prompt("ノート名");
  if(!title)return;

  const newNote = await addDoc(
    collection(db,"files",currentFileId,"notes"),
    {
      title,
      content:"",
      order:999999,
      ownerUid: auth.currentUser.uid,
      createdAt: serverTimestamp()
    }
  );

  currentNoteId = newNote.id;

  const noteText = document.getElementById("noteText");
  noteText.disabled = false;
  noteText.value = "";
  showNote();

  loadNotes();
};

/* ▼ ノート観覧 */
window.viewNote = async function(noteId){
  currentNoteId = noteId;
  const snap = await getDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  const data = snap.data();

  const noteText = document.getElementById("noteText");
  noteText.value = data.content;
  noteText.disabled = true;
  showNote();
};

/* ▼ ノート編集 */
window.editNote = async function(noteId){
  if(readOnly)return;

  currentNoteId = noteId;
  const snap = await getDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  const noteText = document.getElementById("noteText");
  noteText.value = snap.data().content;
  noteText.disabled = false;
  showNote();

  startAutoSave();
};

/* ▼ ノート保存（手動 or 自動） */
window.saveNote = async function(auto=false){
  if(readOnly)return;
  if(!currentNoteId)return;

  const noteText = document.getElementById("noteText");

  await updateDoc(
    doc(db,"files",currentFileId,"notes",currentNoteId),
    { content:noteText.value }
  );

  if(!auto) alert("保存した");
};

/* ▼ 自動保存開始 */
function startAutoSave(){
  if(autoSaveTimer) clearInterval(autoSaveTimer);

  autoSaveTimer = setInterval(()=>{
    if(!readOnly && currentNoteId){
      saveNote(true);
    }
  },5000);
}

/* ▼ ノート削除 */
window.deleteNote = async function(noteId){
  if(readOnly)return;

  if(!confirm("削除する？"))return;
  await deleteDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  if(currentNoteId === noteId){
    currentNoteId = null;
    hideNote();
  }
  loadNotes();
};

/* ▼ ノートだけ閉じる */
window.closeNote = function () {
  currentNoteId = null;
  hideNote();
  if(autoSaveTimer) clearInterval(autoSaveTimer);
};

/* ▼ ファイルを閉じる */
window.closeFile = function () {
  currentFileId = null;
  currentNoteId = null;

  document.getElementById("notesList").innerHTML = "";
  hideNote();
  document.getElementById("addNoteBtn").disabled = true;

  alert("ファイルを閉じました");
};

/* ▼ ファイル削除 */
window.deleteFile = async function () {
  if (!currentFileId) {
    alert("ファイルを選んでください");
    return;
  }

  if (!confirm("本当に削除しますか？")) return;

  const notesSnap = await getDocs(
    collection(db, "files", currentFileId, "notes")
  );

  for (const n of notesSnap.docs) {
    await deleteDoc(doc(db, "files", currentFileId, "notes", n.id));
  }

  await deleteDoc(doc(db, "files", currentFileId));

  alert("ファイルを削除しました");

  currentFileId = null;
  currentNoteId = null;
  document.getElementById("notesList").innerHTML = "";
  hideNote();
  document.getElementById("addNoteBtn").disabled = true;

  loadMyFiles();
};

/* ▼ パスワード変更 */
window.changePassword = async function () {
  if (!currentFileId) {
    alert("ファイルを開いてください");
    return;
  }

  if (readOnly) {
    alert("他人のファイルは変更できません");
    return;
  }

  const newPass = prompt("新しいパスワードを入力してください");
  if (!newPass) return;

  await updateDoc(doc(db, "files", currentFileId), {
    password: hash(newPass)
  });

  alert("パスワードを変更しました");
};

/* ▼ クラシックモード切り替え */
window.toggleClassicMode = function () {
  const body = document.body;
  const btn = document.getElementById("classicModeBtn");
  const themeBtns = document.getElementById("classicThemeButtons");

  if (body.classList.contains("classic-mode")) {
    body.classList.remove("classic-mode","black","wafu");
    btn.textContent = "クラシックモード：OFF";
    themeBtns.style.display = "none";
  } else {
    body.classList.add("classic-mode","black");
    btn.textContent = "クラシックモード：ON";
    themeBtns.style.display = "block";
  }
};

/* ▼ クラシックモードの背景テーマ切り替え */
window.setClassicTheme = function (theme) {
  const body = document.body;

  body.classList.remove("black", "wafu");

  if (theme === "black") {
    body.classList.add("black");
  } else if (theme === "wafu") {
    body.classList.add("wafu");
  }
};

</script>
</body>
</html>
