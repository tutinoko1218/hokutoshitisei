<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>北斗七星</title>

<link href="https://fonts.googleapis.com/css2?family=Yuji+Syuku&display=swap" rel="stylesheet">

<style>
body{
  font-family:sans-serif;
  padding:20px;
  background:#fff7d1;
}

/* ▼ 通常モード：ボタンは元の大きさのまま */
button {
  margin: 10px 0;
}

/* ▼ オトナモード：背景ブラック＋文字白 */
body.adult-mode {
  background:#000;
  color:#fff;
}

body.adult-mode button {
  background:#333;
  color:#fff;
}

body.adult-mode input,
body.adult-mode select,
body.adult-mode textarea {
  background:#222;
  color:#fff;
  border:1px solid #555;
}

/* ▼ ノート内容は最初は非表示 */
#noteText{
  display:none;
  width:100%;
  height:300px;
  padding:20px 30px;
  background:#fffdf5;
  border:1px solid #d8c9a7;
  border-radius:8px;
  font-size:18px;
  line-height:1.8;
  font-family:"Yuji Syuku",serif;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  background-image:
    linear-gradient(to bottom,transparent,transparent),
    repeating-linear-gradient(
      to bottom,
      #fffdf5 0px,
      #fffdf5 28px,
      #e8dcc2 29px
    );
  border-left:4px solid #ffe9a3;
}

.noteItem{
  padding:12px 15px;
  margin:10px 0;
  background:#fffdf5;
  border:1px solid #d8c9a7;
  border-radius:8px;
  font-size:18px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.noteButtons button{
  margin-left:8px;
}
</style>
</head>
<body>

<h1>北斗七星</h1>

<h2>モード切り替え</h2>
<button id="adultModeBtn" onclick="toggleMode()">オトナモード：OFF</button>

<h2>ファイル生成</h2>
<div>ファイル名</div>
<input id="fileTitle">
<div>パスワード</div>
<input id="filePassword" type="password">
<br><br>
<button id="createBtn" onclick="createFile()" disabled>生成</button>

<hr>

<h2>ファイル選択</h2>

<select id="fileSelect"
        onchange="selectFileChanged()"
        onclick="selectFileChanged()"
        ontouchstart="selectFileChanged()"></select>

<button onclick="openSelectedFile()">開く</button>
<button onclick="changePassword()">パスワード変更</button>
<button onclick="deleteFile()">削除</button>
<button onclick="closeFile()">ファイルを閉じる</button>

<hr>

<h2>オトナモード専用ファイル</h2>
<button onclick="openAdultFile()">パスワード無しで開く</button>

<hr>

<h2>ノート一覧</h2>
<div id="notesList"></div>
<button id="addNoteBtn" onclick="addNote()" disabled>＋ノートを追加</button>

<hr>

<h2>ノート内容</h2>
<textarea id="noteText" disabled></textarea><br>

<br>
<button onclick="saveNote()">保存</button>
<button onclick="closeNote()">閉じる</button>

<hr>

<h2>他の人のノートをみる</h2>
<div>パスワードをいれてください</div>

<input id="otherPassword" type="password">
<button onclick="togglePassword()">👁️</button>
<button onclick="openByPassword()">開く</button>

<hr>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getFirestore,
  collection,
  addDoc,
  doc,
  getDoc,
  updateDoc,
  deleteDoc,
  getDocs,
  query,
  where,
  orderBy,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

import {
  getAuth,
  signInAnonymously,
  browserLocalPersistence,
  setPersistence
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyBPl_QKfAZM8TmWEtbi4rXb4ZasdM9WOQg",
  authDomain: "hokutoshitisei.firebaseapp.com",
  projectId: "hokutoshitisei",
  storageBucket: "hokutoshitisei.appspot.com",
  messagingSenderId: "16257405689",
  appId: "1:16257405689:web:17e7b92362c56d82b48828",
  measurementId: "G-LFGEC7VKN3"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let currentFileId = null;
let currentNoteId = null;
let readOnly = false;

/* ▼ パスワードハッシュ */
function hash(str){
  return btoa(unescape(encodeURIComponent(str)));
}

/* ▼ ノート非表示 */
function hideNote(){
  const noteText = document.getElementById("noteText");
  noteText.value = "";
  noteText.disabled = true;
  noteText.style.display = "none";
}

/* ▼ ノート表示 */
function showNote(){
  const noteText = document.getElementById("noteText");
  noteText.style.display = "block";
}

/* ▼ パスワード目玉 */
window.togglePassword = function () {
  const input = document.getElementById("otherPassword");
  input.type = (input.type === "password") ? "text" : "password";
};

/* ▼ スマホ対策：選択した瞬間に更新 */
window.selectFileChanged = function () {
  const fileSelect = document.getElementById("fileSelect");
  currentFileId = fileSelect.value;
};

/* ▼ ログイン後 */
setPersistence(auth, browserLocalPersistence)
  .then(() => signInAnonymously(auth))
  .then(() => {
    document.getElementById("createBtn").disabled = false;
    loadMyFiles();
  });

/* ▼ ファイル作成 */
window.createFile = async function(){
  const title = document.getElementById("fileTitle").value.trim();
  const pass  = document.getElementById("filePassword").value.trim();
  if(!title || !pass){
    alert("入力してね");
    return;
  }

  await addDoc(collection(db,"files"),{
    title,
    password:hash(pass),
    ownerUid:auth.currentUser.uid,
    createdAt:serverTimestamp()
  });

  alert("作成しました");
  loadMyFiles();
};

/* ▼ 自分のファイル一覧 */
async function loadMyFiles(){
  const fileSelect = document.getElementById("fileSelect");
  fileSelect.innerHTML = "";

  const q = query(
    collection(db,"files"),
    where("ownerUid","==",auth.currentUser.uid),
    orderBy("createdAt")
  );

  const snap = await getDocs(q);

  snap.forEach(d=>{
    const op = document.createElement("option");
    op.value = d.id;
    op.textContent = d.data().title;
    fileSelect.appendChild(op);
  });

  hideNote();
}

/* ▼ ファイルを開く */
window.openSelectedFile = function(){
  const fileSelect = document.getElementById("fileSelect");

  currentFileId = fileSelect.value;

  if(!currentFileId){
    alert("ファイルなし");
    return;
  }

  readOnly = false;
  document.getElementById("addNoteBtn").disabled = false;

  hideNote();
  loadNotes();
};

/* ▼ 他人のファイルを開く */
window.openByPassword = async function () {
  const pass = document.getElementById("otherPassword").value.trim();
  if (!pass) {
    alert("パスワードを入力してね");
    return;
  }

  const q = query(collection(db, "files"));
  const snap = await getDocs(q);

  let found = null;

  snap.forEach(d => {
    if (d.data().password === hash(pass)) {
      found = d;
    }
  });

  if (!found) {
    alert("見つからないよ");
    return;
  }

  currentFileId = found.id;
  readOnly = true;
  document.getElementById("addNoteBtn").disabled = true;

  hideNote();
  loadNotes();
};

/* ▼ オトナモード：パスワード無しファイルを開く */
window.openAdultFile = async function () {
  const q = query(collection(db, "files"));
  const snap = await getDocs(q);

  let found = null;

  snap.forEach(d => {
    if (!d.data().password) {
      found = d;
    }
  });

  if (!found) {
    alert("パスワード無しのファイルがありません");
    return;
  }

  currentFileId = found.id;
  readOnly = false;
  document.getElementById("addNoteBtn").disabled = false;

  hideNote();
  loadNotes();
};

/* ▼ ノート一覧 */
async function loadNotes(){
  const notesList = document.getElementById("notesList");
  notesList.innerHTML = "";
  hideNote();

  const q = query(
    collection(db,"files",currentFileId,"notes"),
    orderBy("createdAt")
  );

  const snap = await getDocs(q);

  snap.forEach(d=>{
    const data = d.data();

    const div = document.createElement("div");
    div.className = "noteItem";

    div.innerHTML = `
      <div>${data.title}</div>
      <div class="noteButtons">
        <button onclick="viewNote('${d.id}')">開く</button>
        ${!readOnly ? `<button onclick="editNote('${d.id}')">編集</button>` : ""}
        ${!readOnly ? `<button onclick="deleteNote('${d.id}')">削除</button>` : ""}
      </div>
    `;

    notesList.appendChild(div);
  });
}

/* ▼ ノート追加 */
window.addNote = async function(){
  if(readOnly)return;

  const title = prompt("ノート名");
  if(!title)return;

  const newNote = await addDoc(
    collection(db,"files",currentFileId,"notes"),
    {
      title,
      content:"",
      ownerUid: auth.currentUser.uid,
      createdAt: serverTimestamp()
    }
  );

  currentNoteId = newNote.id;

  const noteText = document.getElementById("noteText");
  noteText.disabled = false;
  noteText.value = "";
  showNote();

  loadNotes();
};

/* ▼ ノート観覧 */
window.viewNote = async function(noteId){
  currentNoteId = noteId;
  const snap = await getDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  const data = snap.data();

  const noteText = document.getElementById("noteText");
  noteText.value = data.content;
  noteText.disabled = true;
  showNote();
};

/* ▼ ノート編集 */
window.editNote = async function(noteId){
  if(readOnly)return;

  currentNoteId = noteId;
  const snap = await getDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  const noteText = document.getElementById("noteText");
  noteText.value = snap.data().content;
  noteText.disabled = false;
  showNote();
};

/* ▼ ノート保存 */
window.saveNote = async function(){
  if(readOnly)return;
  if(!currentNoteId)return;

  const noteText = document.getElementById("noteText");

  await updateDoc(
    doc(db,"files",currentFileId,"notes",currentNoteId),
    { content:noteText.value }
  );
  alert("保存した");
};

/* ▼ ノート削除 */
window.deleteNote = async function(noteId){
  if(readOnly)return;

  if(!confirm("削除する？"))return;
  await deleteDoc(
    doc(db,"files",currentFileId,"notes",noteId)
  );
  if(currentNoteId === noteId){
    currentNoteId = null;
    hideNote();
  }
  loadNotes();
};

/* ▼ ノートだけ閉じる */
window.closeNote = function () {
  currentNoteId = null;
  hideNote();
};

/* ▼ ファイルを閉じる */
window.closeFile = function () {
  currentFileId = null;
  currentNoteId = null;

  document.getElementById("notesList").innerHTML = "";
  hideNote();
  document.getElementById("addNoteBtn").disabled = true;

  alert("ファイルを閉じました");
};

/* ▼ ファイル削除 */
window.deleteFile = async function () {
  if (!currentFileId) {
    alert("ファイルを選んでください");
    return;
  }

  if (!confirm("本当に削除しますか？")) return;

  const notesSnap = await getDocs(
    collection(db, "files", currentFileId, "notes")
  );

  for (const n of notesSnap.docs) {
    await deleteDoc(doc(db, "files", currentFileId, "notes", n.id));
  }

  await deleteDoc(doc(db, "files", currentFileId));

  alert("ファイルを削除しました");

  currentFileId = null;
  currentNoteId = null;
  document.getElementById("notesList").innerHTML = "";
  hideNote();
  document.getElementById("addNoteBtn").disabled = true;

  loadMyFiles();
};

/* ▼ パスワード変更 */
window.changePassword = async function () {
  if (!currentFileId) {
    alert("ファイルを開いてください");
    return;
  }

  if (readOnly) {
    alert("他人のファイルは変更できません");
    return;
  }

  const newPass = prompt("新しいパスワードを入力してください");
  if (!newPass) return;

  await updateDoc(doc(db, "files", currentFileId), {
    password: hash(newPass)
  });

  alert("パスワードを変更しました");
};

/* ▼ オトナモード切り替え */
window.toggleMode = function () {
  const body = document.body;
  const btn = document.getElementById("adultModeBtn");

  if (body.classList.contains("adult-mode")) {
    body.classList.remove("adult-mode");
    btn.textContent = "オトナモード：OFF";
  } else {
    body.classList.add("adult-mode");
    btn.textContent = "オトナモード：ON";
  }
};
</script>

</body>
</html>
